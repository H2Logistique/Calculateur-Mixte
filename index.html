                } catch (e) { config = {}; }

                if (Object.keys(config).length > 0 && window.firebase) {
                    try {
                        firebase.initializeApp(config);
                        const auth = firebase.auth();
                        const database = firebase.firestore();
                        (async () => {
                            try {
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await auth.signInWithCustomToken(__initial_auth_token);
                                else await auth.signInAnonymously();
                                setDb(database);
                                setAuthReady(true);
                            } catch (e) { console.error("Auth Firebase :", e); }
                        })();
                    } catch (e) { console.error("Init Firebase :", e); }
                }
            }, []);

            // Écoute de la version publiée dans le cloud
            useEffect(() => {
                if (!db || !authReady) return;
                const unsub = cfgRef(db).onSnapshot((doc) => {
                    if (doc.exists) {
                        const v = doc.data().latestVersion;
                        setLatestVersion(v || null);
                        if (v && cmpVer(v, APP_VERSION) > 0) setUpdateAvailable(true);
                    }
                }, (e) => console.error("Écoute version :", e));
                return () => unsub && unsub();
            }, [db, authReady]);

            const publishVersion = async () => {
                if (!db) { setAppToast("Firebase non connecté"); setTimeout(() => setAppToast(''), 2500); return; }
                try {
                    await cfgRef(db).set({ latestVersion: APP_VERSION, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                    setAppToast("Version v" + APP_VERSION + " publiée. Les utilisateurs vont être invités à recharger.");
                } catch (e) { setAppToast("Échec de la publication"); }
                setTimeout(() => setAppToast(''), 4000);
            };

            const handleAccess = (e) => {
                e.preventDefault();
                if (accessCode === ACCESS_CODE) { setUnlocked(true); setAccessError(''); }
                else setAccessError("Code d'accès incorrect");
            };

            // --- Écran d'accès ---
            if (!unlocked) {
                return (
                    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm">
                            <div className="flex justify-center mb-6"><div className="bg-slate-800 p-4 rounded-full text-white shadow-lg"><KeyRound size={32} /></div></div>
                            <h1 className="text-2xl font-bold text-center mb-1 text-slate-800">H2 LOGISTIQUE</h1>
                            <p className="text-center text-xs text-slate-400 mb-6">Application interne · v{APP_VERSION}</p>
                            <div>
                                <input type="password" value={accessCode} onChange={e => setAccessCode(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') handleAccess(e); }} placeholder="Code d'accès" className="w-full p-3 border border-slate-300 rounded-lg mb-4 text-center text-lg outline-none focus:ring-2 focus:ring-slate-800" autoFocus />
                                {accessError && <p className="text-red-500 text-sm text-center mb-4 font-medium">{accessError}</p>}
                                <button type="button" onClick={handleAccess} className="w-full py-3 bg-slate-800 text-white font-bold rounded-lg hover:bg-slate-700 shadow-md">Entrer</button>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- Application ---
            return (
                <div className="min-h-screen bg-slate-100">
                    {updateAvailable && (
                        <div className="bg-indigo-600 text-white px-4 py-2.5 flex flex-wrap items-center justify-center gap-3 text-sm font-medium no-print">
                            <RefreshCw size={16} />
                            <span>Une nouvelle version (v{latestVersion}) est disponible.</span>
                            <button onClick={() => window.location.reload()} className="bg-white text-indigo-700 font-bold px-3 py-1 rounded-md hover:bg-indigo-50">Recharger</button>
                            <button onClick={() => setUpdateAvailable(false)} className="opacity-70 hover:opacity-100"><X size={16} /></button>
                        </div>
                    )}

                    <header className="bg-white border-b border-slate-200 sticky top-0 z-[40] shadow-sm">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
                            <div className="flex flex-col leading-tight">
                                <h1 className="text-lg sm:text-xl font-bold text-slate-900">H2 LOGISTIQUE</h1>
                                <span className="text-[10px] text-slate-400 font-mono">v{APP_VERSION}</span>
                            </div>
                            <div className="flex bg-slate-100 rounded-lg p-1 border border-slate-200">
                                <button onClick={() => setTab('tarification')} className={`flex items-center gap-2 px-3 sm:px-4 py-2 text-sm font-semibold rounded-md transition ${tab === 'tarification' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Calculator size={16} /><span className="hidden sm:inline">Tarification</span></button>
                                <button onClick={() => setTab('cubage')} className={`flex items-center gap-2 px-3 sm:px-4 py-2 text-sm font-semibold rounded-md transition ${tab === 'cubage' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Box size={16} /><span className="hidden sm:inline">Cubage & Inventaire</span></button>
                                <button onClick={() => { if (consoleUnlocked) { setTab('console'); } else { setShowConsoleCode(true); } }} className={`flex items-center gap-2 px-3 sm:px-4 py-2 text-sm font-semibold rounded-md transition ${tab === 'console' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><Lock size={16} /><span className="hidden sm:inline">Console</span></button>
                            </div>
                            <div className="w-16 hidden sm:block"></div>
                        </div>
                    </header>

                    <main>
                        {tab === 'tarification' && <PriceModule db={db} dbReady={!!(db && authReady)} latestVersion={latestVersion} publishVersion={publishVersion} sharedPrices={prices} setSharedPrices={setPrices} sharedMatrix={matrixData} setSharedMatrix={setMatrixData} sharedNatGrid={nationalGrid} setSharedNatGrid={setNationalGrid} sharedLocalGrid={localGrid} setSharedLocalGrid={setLocalGrid} />}
                        {tab === 'cubage' && <CubageModule db={db} dbReady={!!(db && authReady)} />}
                        {tab === 'console' && <ConsoleView prices={prices} localGrid={localGrid} nationalGrid={nationalGrid} matrixData={matrixData} />}
                    </main>

                    {/* Modal code Console */}
                    {showConsoleCode && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[70] p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                                <div className="flex items-center gap-3 mb-4"><div className="bg-slate-100 p-2 rounded-full"><Lock size={20} className="text-slate-700" /></div><h2 className="text-xl font-bold text-slate-800">Accès Console</h2></div>
                                <p className="text-sm text-slate-500 mb-4">Entrez le code administrateur pour accéder à la console des tarifs.</p>
                                <input type="password" value={consoleCodeInput} onChange={e => setConsoleCodeInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') verifyConsole(); }} autoFocus placeholder="Code administrateur" className="w-full p-3 border border-slate-300 rounded-lg mb-3 text-center tracking-widest text-lg outline-none focus:ring-2 focus:ring-blue-500" />
                                {consoleError && <p className="text-red-500 text-xs mb-3 text-center font-medium">{consoleError}</p>}
                                <div className="flex gap-2">
                                    <button type="button" onClick={() => { setShowConsoleCode(false); setConsoleError(''); setConsoleCodeInput(''); }} className="flex-1 py-2 text-slate-600 font-medium bg-slate-100 rounded-lg hover:bg-slate-200">Annuler</button>
                                    <button type="button" onClick={verifyConsole} className="flex-1 py-2 text-white font-medium bg-blue-600 rounded-lg hover:bg-blue-700">Valider</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {appToast && <Toast msg={appToast} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
