            { id: 163, name: "Machine à laver (petit)", vol: 0.5 }, { id: 164, name: "Vélo d'appartement", vol: 0.5 },
            { id: 165, name: "Salon de jardin (complet)", vol: 2 }, { id: 166, name: "Cave à vin", vol: 1 },
            { id: 167, name: "Aquarium (vide)", vol: 0.3 }, { id: 168, name: "Arbre à chat", vol: 0.5 },
            { id: 169, name: "Outillage (lot)", vol: 0.5 }, { id: 170, name: "Hotte aspirante", vol: 0.3 },
            { id: 171, name: "Enfilade", vol: 2 }, { id: 172, name: "Scooter / Moto", vol: 2 },
            { id: 173, name: "Mobilier demonté", vol: -0.5 }
        ];

        const ROOMS = ["Generale", "Salon", "Cuisine", "Chambre 1", "Chambre 2", "Chambre 3", "Chambre 4", "SDB", "Entree", "Garage", "Exterieur", "Divers"];
        const ROOM_LABELS = { Generale: "Générale", Salon: "Salon / Séjour", Cuisine: "Cuisine", "Chambre 1": "Chambre 1", "Chambre 2": "Chambre 2", "Chambre 3": "Chambre 3", "Chambre 4": "Chambre 4", SDB: "Salle de bain / WC", Entree: "Entrée / Couloir", Garage: "Garage / Cave", Exterieur: "Extérieur", Divers: "Divers" };

        const DEFAULT_NOTES = `Adresse de chargement : 

Logement : 
Étage : 
Escalier : 
Ascenseur : 
Portage : 
Détails :
——
Adresse de déchargement : 

Logement :
Étage :
Escalier :
Ascenseur : 
Portage : 
Détails : 
——

Date du déménagement :

——

Inventaire : 
`;

        /* =================================================================
           COMPOSANTS PARTAGÉS
           ================================================================= */
        const Modal = ({ icon, color, title, children, onClose, closeLabel = "OK" }) => (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[70] p-4 no-print">
                <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm text-center">
                    {icon && <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${color}`}>{icon}</div>}
                    <h2 className="text-xl font-bold text-slate-800 mb-2">{title}</h2>
                    <div className="text-slate-600 mb-6 leading-relaxed">{children}</div>
                    <button onClick={onClose} className="w-full py-3 bg-slate-800 text-white font-bold rounded-lg hover:bg-slate-700 transition-all shadow-md">{closeLabel}</button>
                </div>
            </div>
        );

        const Toast = ({ msg }) => (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-[80] no-print">{msg}</div>
        );

        /* =================================================================
           TARIFICATION — ADMIN
           ================================================================= */
        const PriceAdmin = ({ prices, setPrices, matrixData, setMatrixData, initialData, nationalGrid, setNationalGrid, localGrid, setLocalGrid, onBack, onPublishVersion, latestVersion, dbReady }) => {
            const handlePriceChange = (id, v) => { const n = parseFloat(v); setPrices(p => ({ ...p, [id]: isNaN(n) ? 0 : n })); };
            const handleMatrix = (i, f, v) => { const n = parseFloat(v); setMatrixData(d => { const a = [...d]; a[i] = { ...a[i], [f]: isNaN(n) ? 0 : n }; return a; }); };
            const handleLocal = (i, f, v) => { const n = parseFloat(v); setLocalGrid(d => { const a = [...d]; a[i] = { ...a[i], [f]: isNaN(n) ? 0 : n }; return a; }); };
            const handleNat = (i, f, v) => {
                setNationalGrid(d => {
                    const a = [...d];
                    if (f === 'type') a[i] = { ...a[i], type: v };
                    else { const n = parseFloat(v); a[i] = { ...a[i], [f]: isNaN(n) ? 0 : n }; }
                    return a;
                });
            };
            const addNatRow = () => setNationalGrid(d => [...d, { id: 'n' + Date.now(), max: 800, type: 'fixed', value: 2500, addOn: 0 }]);
            const delNatRow = (i) => setNationalGrid(d => d.filter((_, idx) => idx !== i));

            const renderPriceTable = (items, title) => (
                <div className="mb-6">
                    <h3 className="text-lg font-bold text-slate-700 mb-3">{title}</h3>
                    <div className="bg-white border border-slate-200 rounded-lg overflow-hidden">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-slate-50 text-slate-500 uppercase text-xs border-b"><tr><th className="px-4 py-2">Désignation</th><th className="px-4 py-2 w-32 text-right">Prix (€)</th></tr></thead>
                            <tbody>
                                {items.map(item => (
                                    <tr key={item.id} className="border-b last:border-0 hover:bg-slate-50">
                                        <td className="px-4 py-2 text-slate-700 font-medium">{item.name}{item.iconType ? ` (${item.iconType})` : ''}</td>
                                        <td className="px-4 py-2"><input type="number" step="0.01" value={prices[item.id] || 0} onChange={e => handlePriceChange(item.id, e.target.value)} className="w-full text-right border border-slate-300 rounded p-1.5 focus:ring-2 focus:ring-blue-500 outline-none" /></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            return (
                <div className="bg-slate-100 p-4 md:p-8">
                    <div className="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow border border-slate-200">
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <h2 className="text-2xl font-bold text-slate-800">Administration — Tarification</h2>
                            <button onClick={onBack} className="flex items-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-lg hover:bg-slate-700"><ArrowLeft size={16} /> Retour au calculateur</button>
                        </div>

                        {/* Gestion des versions */}
                        <div className="mb-8 bg-indigo-50 border border-indigo-200 rounded-lg p-5">
                            <div className="flex items-center gap-2 mb-2"><RefreshCw size={18} className="text-indigo-600" /><h3 className="text-lg font-bold text-indigo-800">Diffusion de version</h3></div>
                            <p className="text-sm text-slate-600 mb-3">Version de ce poste : <span className="font-bold">v{APP_VERSION}</span> &nbsp;•&nbsp; Version publiée (cloud) : <span className="font-bold">{latestVersion ? 'v' + latestVersion : '—'}</span></p>
                            <p className="text-xs text-slate-500 mb-4">Après avoir déployé une nouvelle version du fichier, cliquez ci-dessous : tous les utilisateurs connectés verront une bannière les invitant à recharger.</p>
                            <button onClick={onPublishVersion} disabled={!dbReady} className={`flex items-center gap-2 px-4 py-2 rounded-lg font-semibold shadow-sm ${dbReady ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                <Upload size={16} /> Publier la version v{APP_VERSION} pour tous
                            </button>
                            {!dbReady && <p className="text-xs text-amber-600 mt-2">Firebase non connecté : renseignez FIREBASE_CONFIG dans le code pour activer cette fonction.</p>}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div>
                                {renderPriceTable(initialData.prestation, "1. Prestation de service")}
                                {renderPriceTable(initialData.ra_monte_meuble, "2. Monte-meuble et AOT")}
                                {renderPriceTable(initialData.materiel, "3. Matériel & Livraison")}
                            </div>
                            <div className="flex flex-col gap-8">
                                {/* Grille LOCAL */}
                                <div>
                                    <h3 className="text-lg font-bold text-slate-700 mb-3">Grille distance LOCAL</h3>
                                    <div className="bg-white border border-slate-200 rounded-lg overflow-hidden">
                                        <table className="w-full text-sm text-center">
                                            <thead className="bg-slate-50 text-slate-500 uppercase text-xs border-b"><tr><th className="px-4 py-2">De (km)</th><th className="px-4 py-2">À (km)</th><th className="px-4 py-2">Prix/km (€)</th></tr></thead>
                                            <tbody>
                                                {localGrid.map((row, i) => (
                                                    <tr key={row.id} className="border-b last:border-0 hover:bg-slate-50">
                                                        <td className="px-4 py-2"><input type="number" value={row.min} onChange={e => handleLocal(i, 'min', e.target.value)} className="w-full text-center border border-slate-300 rounded p-1.5 outline-none focus:ring-2 focus:ring-blue-500" /></td>
                                                        <td className="px-4 py-2"><input type="number" value={row.max} onChange={e => handleLocal(i, 'max', e.target.value)} className="w-full text-center border border-slate-300 rounded p-1.5 outline-none focus:ring-2 focus:ring-blue-500" /></td>
                                                        <td className="px-4 py-2"><input type="number" step="0.1" value={row.price} onChange={e => handleLocal(i, 'price', e.target.value)} className="w-full text-center border border-slate-300 rounded p-1.5 outline-none focus:ring-2 focus:ring-blue-500" /></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                {/* Grille FORFAIT NATIONAL */}
                                <div>
                                    <div className="flex justify-between items-center mb-3">
                                        <h3 className="text-lg font-bold text-slate-700 flex items-center gap-2"><MapIcon size={18} className="text-blue-600" /> Forfaits distance NATIONAL</h3>
                                        <button onClick={addNatRow} className="text-xs flex items-center gap-1 px-2 py-1 bg-blue-50 text-blue-700 border border-blue-200 rounded hover:bg-blue-100"><Plus size={14} /> Palier</button>
                                    </div>
                                    <div className="bg-white border border-slate-200 rounded-lg overflow-hidden">
                                        <table className="w-full text-sm text-center">
                                            <thead className="bg-slate-50 text-slate-500 uppercase text-xs border-b"><tr><th className="px-3 py-2">Jusqu'à (km)</th><th className="px-3 py-2">Type</th><th className="px-3 py-2">Valeur (€)</th><th className="px-3 py-2">+/- (€)</th><th className="px-2 py-2"></th></tr></thead>
                                            <tbody>
                                                {nationalGrid.map((row, i) => (
                                                    <tr key={row.id} className="border-b last:border-0 hover:bg-slate-50">
                                                        <td className="px-2 py-2"><input type="number" value={row.max} onChange={e => handleNat(i, 'max', e.target.value)} className="w-20 text-center border border-slate-300 rounded p-1 outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                        <td className="px-2 py-2">
                                                            <select value={row.type} onChange={e => handleNat(i, 'type', e.target.value)} className="text-xs border border-slate-300 rounded p-1 outline-none bg-white">
                                                                <option value="fixed">Forfait</option>
                                                                <option value="perKm">€/km</option>
                                                            </select>
                                                        </td>
                                                        <td className="px-2 py-2"><input type="number" step="0.1" value={row.value} onChange={e => handleNat(i, 'value', e.target.value)} className="w-20 text-center border border-slate-300 rounded p-1 outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                        <td className="px-2 py-2"><input type="number" step="0.1" value={row.addOn || 0} onChange={e => handleNat(i, 'addOn', e.target.value)} className="w-16 text-center border border-slate-300 rounded p-1 outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                        <td className="px-1 py-2"><button onClick={() => delNatRow(i)} className="text-slate-300 hover:text-red-500"><Trash2 size={15} /></button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    <p className="text-[11px] text-slate-400 mt-2">« Forfait » = prix fixe tous camions inclus pour la tranche. « €/km » = prix au km × distance (utilisé au-delà du dernier forfait).</p>
                                </div>
                            </div>
                        </div>

                        {/* Matrice volume */}
                        <div>
                            <h3 className="text-lg font-bold text-slate-700 mb-3">Matrice de calcul (volume)</h3>
                            <div className="bg-white border border-slate-200 rounded-lg overflow-hidden h-[600px] flex flex-col">
                                <div className="overflow-y-auto flex-grow">
                                    <table className="w-full text-sm text-center relative">
                                        <thead className="bg-slate-800 text-white text-xs sticky top-0 z-10 uppercase shadow-md">
                                            <tr><th className="px-2 py-3 w-16">m³</th><th className="px-2 py-3">Prix base (€)</th><th className="px-2 py-3">Étages (€)</th><th className="px-2 py-3">Portage (€)</th><th className="px-2 py-3 w-20">Camions</th></tr>
                                        </thead>
                                        <tbody>
                                            {matrixData.map((row, i) => (
                                                <tr key={row.m3} className="border-b last:border-0 hover:bg-slate-50">
                                                    <td className="px-2 py-2 font-bold bg-slate-50 border-r">{row.m3}</td>
                                                    <td className="px-2 py-2"><input type="number" step="0.01" value={row.prix} onChange={e => handleMatrix(i, 'prix', e.target.value)} className="w-20 text-center border border-slate-300 rounded p-1 outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                    <td className="px-2 py-2"><input type="number" step="0.1" value={row.etage} onChange={e => handleMatrix(i, 'etage', e.target.value)} className="w-20 text-center border border-slate-300 rounded p-1 outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                    <td className="px-2 py-2"><input type="number" step="0.1" value={row.portage} onChange={e => handleMatrix(i, 'portage', e.target.value)} className="w-20 text-center border border-slate-300 rounded p-1 outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                    <td className="px-2 py-2 text-slate-600 font-medium">{row.camion}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* =================================================================
           TARIFICATION — SECTION & CARTE
           ================================================================= */
        const TableSection = ({ title, items, colorClass, quantities, prices, onQuantityChange, calculateRowTotal, onClear, defaultExpanded = true, quantityLabel = "Quantité", disableQuantityInput = false, customTotal }) => {
            const [open, setOpen] = useState(defaultExpanded);
            const computed = items.reduce((s, it) => s + calculateRowTotal(it.id), 0);
            const sectionTotal = customTotal !== undefined ? customTotal : computed;
            const booleanItems = ['p5', 'p6', 'p7', 'l4', 'p9'];
            return (
                <div className="mb-4 bg-white rounded-lg shadow-sm overflow-hidden border border-slate-200">
                    <div className={`px-6 py-4 ${colorClass} border-b border-slate-200 flex justify-between items-center`}>
                        <div className="flex items-center gap-3 cursor-pointer select-none flex-grow" onClick={() => setOpen(!open)}>
                            <h3 className="font-bold text-lg">{title}</h3>
                            {!open && <span className="text-sm font-medium text-slate-800 bg-white px-2 py-0.5 rounded-full shadow-sm">{formatCurrency(sectionTotal)}</span>}
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={(e) => { e.stopPropagation(); onClear(items); }} className="opacity-70 hover:opacity-100 hover:text-red-400 p-1 rounded" title="Effacer"><Trash2 size={18} /></button>
                            <div className="cursor-pointer ml-2" onClick={() => setOpen(!open)}>{open ? <ChevronUp size={20} /> : <ChevronDown size={20} />}</div>
                        </div>
                    </div>
                    {open && (
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead className="text-xs text-slate-500 uppercase bg-slate-50"><tr><th className="px-6 py-3 w-1/3">Désignation</th><th className="px-6 py-3 w-1/4 text-center">{quantityLabel}</th><th className="px-6 py-3 w-1/4 text-right">Unité de prix</th><th className="px-6 py-3 w-1/6 text-right">Total</th></tr></thead>
                                <tbody>
                                    {items.map((item) => {
                                        const qv = quantities[item.id];
                                        const displayQty = (qv === 0 || qv === undefined) ? '' : qv;
                                        const isBool = booleanItems.includes(item.id);
                                        const isDisabled = disableQuantityInput || item.readOnlyQuantity;
                                        return (
                                            <tr key={item.id} className="border-b hover:bg-slate-50">
                                                <td className="px-6 py-4 font-medium text-slate-900">
                                                    <div className="flex items-center gap-3">
                                                        {item.iconType === 'local' && <div className="flex items-center gap-1.5 bg-emerald-50 text-emerald-700 border border-emerald-200 px-2 py-1 rounded-md shadow-sm shrink-0"><MapPin size={16} /><span className="text-[10px] font-bold tracking-wider">LOCAL</span></div>}
                                                        {item.iconType === 'national' && <div className="flex items-center gap-1.5 bg-blue-50 text-blue-700 border border-blue-200 px-2 py-1 rounded-md shadow-sm shrink-0"><MapIcon size={16} /><span className="text-[10px] font-bold tracking-wider">NATIONAL</span></div>}
                                                        <span className={item.iconType ? "font-semibold text-slate-800" : ""}>{item.name}</span>
                                                        {item.info && (
                                                            <div className="group relative flex items-center cursor-help">
                                                                <Info size={22} className="text-blue-600 hover:text-blue-800 drop-shadow-md" />
                                                                <div className="absolute left-full ml-2 w-64 p-3 bg-slate-800 text-white text-sm rounded shadow-xl z-50 hidden group-hover:block border border-slate-700">{item.info}</div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </td>
                                                <td className="px-6 py-4 text-center">
                                                    {isBool ? (
                                                        <div className="flex justify-center gap-1">
                                                            <button onClick={() => onQuantityChange(item.id, 1)} className={`px-3 py-1 text-xs font-semibold rounded-l-md border ${qv === 1 ? 'bg-green-600 text-white border-green-600' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>OUI</button>
                                                            <button onClick={() => onQuantityChange(item.id, 0)} className={`px-3 py-1 text-xs font-semibold rounded-r-md border ${qv === 0 ? 'bg-red-600 text-white border-red-600' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>NON</button>
                                                        </div>
                                                    ) : (
                                                        <input type="number" min="0" value={displayQty} placeholder="0" disabled={isDisabled} onChange={e => onQuantityChange(item.id, e.target.value)} className={`w-24 text-center p-2 border border-slate-300 rounded-md outline-none ${isDisabled ? 'bg-slate-100 cursor-not-allowed' : 'focus:ring-2 focus:ring-blue-500'}`} />
                                                    )}
                                                </td>
                                                <td className="px-6 py-4 text-right">
                                                    {item.id === 'l4' ? <span className="text-slate-400 text-xs italic">Option</span> : item.id === 'l2' ? <span className="text-blue-600 font-medium text-xs">Forfait</span> : <span className="text-slate-600 font-medium">{formatCurrency(prices[item.id])}</span>}
                                                </td>
                                                <td className="px-6 py-4 text-right font-bold text-slate-700">{formatCurrency(calculateRowTotal(item.id))}</td>
                                            </tr>
                                        );
                                    })}
                                    <tr className="bg-slate-50 font-bold border-t-2 border-slate-200">
                                        <td colSpan="3" className="px-6 py-4 text-right text-slate-600 uppercase text-xs tracking-wider">Sous-total {title}</td>
                                        <td className="px-6 py-4 text-right text-slate-800 text-base">{formatCurrency(sectionTotal)}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        };

        const OfferCard = ({ title, subtitle, ht, adj, final, color, needsConfirmation }) => {
            const adjAmount = final - ht;
            const colors = { blue: "border-slate-200 bg-blue-50 text-blue-900 font-bold", purple: "border-purple-200 bg-purple-50 text-purple-900 font-bold", teal: "border-teal-200 bg-teal-50 text-teal-900 font-bold", orange: "border-orange-200 bg-orange-50 text-orange-900 font-bold", indigo: "border-indigo-200 bg-indigo-50 text-indigo-900 font-bold" };
            return (
                <div className="border rounded-lg overflow-hidden flex flex-col h-full shadow-sm">
                    <div className={`p-4 text-center border-b uppercase tracking-wider ${colors[color]}`}>
                        {title}
                        {subtitle && <div className="text-[10px] font-medium normal-case tracking-normal mt-0.5 opacity-80">{subtitle}</div>}
                    </div>
                    {needsConfirmation ? (
                        <div className="p-4 flex-grow flex items-center justify-center bg-slate-50"><span className="text-center font-bold text-slate-700 text-sm">Confirmer avec l'exploitation pour SSTT</span></div>
                    ) : (
                        <div className="p-4 space-y-2 flex-grow bg-white">
                            <div className="flex justify-between text-sm text-slate-500"><span>Total HT :</span><span>{formatCurrency(ht)}</span></div>
                            <div className="flex justify-between text-sm text-slate-500 border-b border-slate-100 pb-2"><span>Ajustement :</span><span className={adj < 0 ? 'text-green-600 font-medium' : (adj > 0 ? 'text-red-600 font-medium' : 'text-slate-600')}>{adj}% ({formatCurrency(adjAmount)})</span></div>
                            <div className="pt-2 text-center"><span className="block text-xs text-slate-400 uppercase tracking-wider mb-1">Total TTC</span><span className="block text-2xl font-bold text-slate-800">{formatCurrency(final)}</span></div>
                        </div>
                    )}
                </div>
            );
        };

        /* =================================================================
           MODULE TARIFICATION
           ================================================================= */
        const PriceModule = ({ db, dbReady, latestVersion, publishVersion, sharedPrices, setSharedPrices, sharedMatrix, setSharedMatrix, sharedNatGrid, setSharedNatGrid, sharedLocalGrid, setSharedLocalGrid }) => {
            const [view, setView] = useState('calc');
            const prices = sharedPrices;
            const setPrices = setSharedPrices;
            const [quantities, setQuantities] = useState(() => { const q = { l1: 0 }; [...INITIAL_DATA.prestation, ...INITIAL_DATA.ra_monte_meuble, ...INITIAL_DATA.materiel].forEach(i => q[i.id] = 0); return q; });
            const matrixData = sharedMatrix;
            const setMatrixData = setSharedMatrix;
            const [adjustment, setAdjustment] = useState(0);
            const [showLogin, setShowLogin] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState('');
            const nationalGrid = sharedNatGrid;
            const setNationalGrid = setSharedNatGrid;
            const localGrid = sharedLocalGrid;
            const setLocalGrid = setSharedLocalGrid;
            const [alertType, setAlertType] = useState(null);
            const [infoPopup, setInfoPopup] = useState(null);

            const updatePricesBasedOnCubage = (cubageValue) => {
                const vol = parseInt(cubageValue) || 0;
                const row = matrixData.find(r => r.m3 === vol);
                if (row) {
                    setPrices(prev => ({ ...prev, 'p1': row.prix, 'p2': row.etage, 'p4': row.portage, 'p9': row.confort, 'l1': 1300 }));
                    setQuantities(prev => ({ ...prev, 'l1': row.camion }));
                } else if (vol > 0) {
                    const camion = vol <= 25 ? 1 : Math.ceil((vol - 5) / 20);
                    setQuantities(prev => ({ ...prev, 'l1': camion }));
                }
            };

            const handleLogin = (e) => { e.preventDefault(); if (passwordInput === ADMIN_CODE) { setView('admin'); setShowLogin(false); setPasswordInput(''); setLoginError(''); } else setLoginError('Mot de passe incorrect'); };

            const handleQuantityChange = (id, value) => {
                let newVal = 0;
                if (typeof value === 'number') newVal = value;
                else if (value !== '') { newVal = parseInt(value); if (isNaN(newVal)) newVal = 0; }
                const tempCubage = id === 'p1' ? newVal : (quantities['p1'] || 0);
                const tempLocalDist = id === 'p8' ? newVal : (quantities['p8'] || 0);

                if (id === 'p1' && newVal >= 45) setAlertType('volume');
                if (id === 'p8' && newVal > 100) setAlertType('approche');
                if ((id === 'p1' || id === 'p8') && tempLocalDist > 50 && tempCubage > 0 && tempCubage < 15) setAlertType('cubage_distance');
                if (id === 'l4' && newVal === 1) setInfoPopup({ title: "Information Groupage", message: "Notifier au client le besoin de disponibilité. Ne rédiger aucune date ferme sur le devis." });
                if (id === 'p9' && newVal === 1) setInfoPopup({ title: "Option Confort", message: "Les cartons sont inclus dans le prix de l'option Confort (160 € par tranche de 10 m³). Ne remplissez pas la section « 3. Matériel & Livraison ». Si le nombre de cartons demandé est extrême, adaptez le prix manuellement." });

                if (id === 'p8') {
                    setPrices(prev => { const next = { ...prev }; const rule = localGrid.find(r => newVal >= r.min && newVal <= r.max); next['p8'] = rule ? rule.price : (localGrid[0]?.price || 1); return next; });
                }

                setQuantities(prev => {
                    const next = { ...prev, [id]: value === '' ? 0 : newVal };
                    if (['m1', 'm2', 'm3', 'm4', 'm5'].includes(id)) { const hasMat = ['m1', 'm2', 'm3', 'm4', 'm5'].some(mid => (mid === id ? newVal : prev[mid]) > 0); next['m6'] = hasMat ? 1 : 0; }
                    if (id === 'p5' || id === 'p6') { if (next['p5'] === 1 || next['p6'] === 1) next['p7'] = 1; else if (next['p5'] === 0 && next['p6'] === 0) next['p7'] = 0; }
                    return next;
                });
                if (id === 'p1') updatePricesBasedOnCubage(newVal);
            };

            const handleClearSection = (items) => {
                setQuantities(prev => { const next = { ...prev }; items.forEach(i => { if (!i.readOnlyQuantity) next[i.id] = 0; }); if (items.some(i => i.id === 'p1')) next['l1'] = 0; if (items.some(i => i.id === 'm1')) next['m6'] = 0; return next; });
            };
            const handleGlobalClear = () => { const q = { l1: 0 }; [...INITIAL_DATA.prestation, ...INITIAL_DATA.ra_monte_meuble, ...INITIAL_DATA.materiel].forEach(i => q[i.id] = 0); setQuantities(q); setAdjustment(0); };

            // --- Forfait national : recherche du palier ---
            const findNationalBand = (dist) => {
                if (dist <= 0) return null;
                const sorted = [...nationalGrid].sort((a, b) => a.max - b.max);
                return sorted.find(b => dist <= b.max) || sorted[sorted.length - 1];
            };

            const calculateRowTotal = (id) => {
                const qty = quantities[id] || 0;
                const price = prices[id] || 0;
                const dist = quantities['l2'] || 0;
                const isGroupageActive = quantities['l4'] === 1;

                if (id === 'p8') { const rule = localGrid.find(r => qty >= r.min && qty <= r.max); if (!rule) return 0; return qty * rule.price * (quantities['l1'] || 0); }
                if (id === 'p2') return Math.round((price * (quantities['p1'] || 0) * qty) / 5) * 5;
                if (id === 'p4') { if (qty <= 20) return 0; return Math.round((price * qty * (quantities['l1'] || 0)) / 5) * 5; }
                if (id === 'p9') return qty === 1 ? price : 0;
                if (id === 'l1') return 0;
                if (id === 'l2') {
                    if (dist === 0) return 0;
                    const band = findNationalBand(dist);
                    if (!band) return 0;
                    const addOn = band.addOn || 0;
                    if (band.type === 'fixed') {
                        const forfait = band.value + addOn; // tous camions inclus
                        if (isGroupageActive) {
                            const groupageCalc = (forfait / 20) * (quantities['p1'] || 0) * 1.35;
                            return Math.round(Math.min(groupageCalc, forfait));
                        }
                        return Math.round(forfait);
                    } else { // perKm
                        const perTruck = dist * band.value + addOn;
                        if (isGroupageActive) {
                            const groupageCalc = (perTruck / 20) * (quantities['p1'] || 0) * 1.35;
                            return Math.round(Math.min(groupageCalc, perTruck * (quantities['l1'] || 0)));
                        }
                        return Math.round(perTruck * (quantities['l1'] || 0));
                    }
                }
                if (id === 'l4') return 0;
                if (id === 'p1') return Math.round(qty * price);
                return qty * price;
            };

            const calculateSectionTotal = (items) => items.reduce((s, it) => s + calculateRowTotal(it.id), 0);

            const basePrestationItems = INITIAL_DATA.prestation.filter(i => i.id !== 'l2' && i.id !== 'l4');
            const prestationTotalForBase = calculateSectionTotal(basePrestationItems);
            const raTotal = calculateSectionTotal(INITIAL_DATA.ra_monte_meuble);
            const materielTotal = Math.round(calculateSectionTotal(INITIAL_DATA.materiel) / 5) * 5;
            const effectiveMaterielTotal = quantities['p9'] === 1 ? 0 : materielTotal;
            const distanceTotal = calculateRowTotal('l2');
            const baseTotal = Math.round((prestationTotalForBase + raTotal + effectiveMaterielTotal) / 5) * 5;
            const prestationLDAddon = prestationTotalForBase - calculateRowTotal('p1') - calculateRowTotal('p8');
            const isGroupageActive = quantities['l4'] === 1;
            const thirdTotalBase = Math.round((distanceTotal + effectiveMaterielTotal + raTotal + prestationLDAddon) / 5) * 5;

            let prestationSubtotal = calculateSectionTotal(INITIAL_DATA.prestation);
            if (distanceTotal > 0) prestationSubtotal -= calculateRowTotal('p1');

            const needsConfirmationLD = quantities['p1'] >= 27 && quantities['p1'] <= 33;
            const applyAdj = (v) => Math.round((v + (v * (adjustment / 100))) / 5) * 5;
            const thirdOfferAdjustment = adjustment < 0 ? 0 : adjustment;
            const applyThirdAdj = (v) => Math.round((v + (v * (thirdOfferAdjustment / 100))) / 5) * 5;

            const natDist = quantities['l2'] || 0;
            const natBand = findNationalBand(natDist);
            const natSubtitle = natBand ? (natBand.type === 'fixed' ? `Forfait ≤ ${natBand.max} km : ${formatCurrency(natBand.value + (natBand.addOn || 0))}` : `${formatCurrency(natBand.value)}/km`) : '';

            if (view === 'admin') return <PriceAdmin prices={prices} setPrices={setPrices} matrixData={matrixData} setMatrixData={setMatrixData} initialData={INITIAL_DATA} nationalGrid={nationalGrid} setNationalGrid={setNationalGrid} localGrid={localGrid} setLocalGrid={setLocalGrid} onBack={() => setView('calc')} onPublishVersion={publishVersion} latestVersion={latestVersion} dbReady={dbReady} />;

            return (
                <div className="p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        {showLogin && (
                            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[70] p-4">
                                <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                                    <div className="flex items-center gap-3 mb-6"><div className="bg-slate-100 p-2 rounded-full"><Lock size={20} className="text-slate-700" /></div><h2 className="text-xl font-bold text-slate-800">Accès Administrateur</h2></div>
                                    <div>
                                        <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') handleLogin(e); }} placeholder="Code administrateur" autoFocus className="w-full p-3 border border-slate-300 rounded-lg mb-3 outline-none focus:ring-2 focus:ring-blue-500" />
                                        {loginError && <p className="text-red-500 text-sm mb-4 font-medium">{loginError}</p>}
                                        <div className="flex gap-3 justify-end mt-2"><button type="button" onClick={() => setShowLogin(false)} className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-100 rounded-lg">Annuler</button><button type="button" onClick={handleLogin} className="px-4 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 shadow-sm">Valider</button></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {alertType && (
                            <Modal icon={<Info size={32} />} color="bg-amber-100 text-amber-600" title="Valider avec l'exploitation" onClose={() => setAlertType(null)} closeLabel="J'ai compris">
                                {alertType === 'volume' && "Pour un volume supérieur à 45 m³, valider le prix avec l'exploitation."}
                                {alertType === 'approche' && "Distance National : renseignez la cellule Distance (km) NATIONAL."}
                                {alertType === 'cubage_distance' && "Motif : cubage & distance intermédiaire."}
                            </Modal>
                        )}
                        {infoPopup && (
                            <Modal icon={<Info size={32} />} color="bg-blue-100 text-blue-600" title={infoPopup.title} onClose={() => setInfoPopup(null)}>{infoPopup.message}</Modal>
                        )}

                        <div className="flex flex-col lg:flex-row gap-6 items-start">
                            <div className="w-full lg:w-2/3 flex flex-col gap-4">
                                <TableSection title="1. Prestation de service" items={INITIAL_DATA.prestation} colorClass="bg-slate-800 text-white" quantities={quantities} prices={prices} onQuantityChange={handleQuantityChange} calculateRowTotal={calculateRowTotal} onClear={handleClearSection} customTotal={prestationSubtotal} />
                                <TableSection title="2. Monte-meuble et AOT" items={INITIAL_DATA.ra_monte_meuble} colorClass="bg-slate-800 text-white" quantities={quantities} prices={prices} onQuantityChange={handleQuantityChange} calculateRowTotal={calculateRowTotal} onClear={handleClearSection} defaultExpanded={false} />
                                <TableSection title="3. Matériel & Livraison" items={INITIAL_DATA.materiel} colorClass="bg-slate-800 text-white" quantities={quantities} prices={prices} onQuantityChange={handleQuantityChange} calculateRowTotal={calculateRowTotal} onClear={handleClearSection} defaultExpanded={false} />
                            </div>

                            <div className="w-full lg:w-1/3 lg:sticky lg:top-24 no-print flex flex-col gap-4">
                                <div className="bg-white rounded-lg shadow-md border border-slate-200 overflow-hidden">
                                    <div className="bg-slate-800 text-white px-5 py-4 flex justify-between items-center">
                                        <h3 className="font-bold text-lg">Récapitulatif</h3>
                                        <div className="bg-slate-700 px-3 py-1.5 rounded-md text-sm font-semibold flex items-center gap-2 border border-slate-600 shadow-inner"><Truck size={16} className="text-slate-300" /><span className="text-amber-400 text-base">{quantities['l1'] || 0}</span></div>
                                    </div>
                                    <div className="p-5 space-y-6 bg-slate-50">
                                        <div className="flex flex-col gap-3 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                                            <div className="flex justify-between items-center mb-1">
                                                <label className="text-sm font-bold text-slate-700">Remise / Majoration</label>
                                                <div className="flex gap-2">
                                                    <button onClick={handleGlobalClear} title="Tout effacer" className="p-2 text-red-600 bg-red-50 hover:bg-red-100 rounded-md border border-red-200"><RotateCcw size={16} /></button>
                                                    <button onClick={() => setShowLogin(true)} title="Admin" className="p-2 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-md border border-slate-300"><Lock size={16} /></button>
                                                </div>
                                            </div>
                                            <select value={adjustment} onChange={e => setAdjustment(parseInt(e.target.value))} className="w-full p-2.5 text-base border border-slate-300 rounded-lg bg-slate-50 outline-none font-semibold focus:ring-2 focus:ring-blue-500 focus:bg-white cursor-pointer">
                                                <option value="-30">- 30%</option><option value="-20">- 20%</option><option value="-10">- 10%</option><option value="0">0%</option><option value="10">+ 10%</option><option value="20">+ 20%</option><option value="30">+ 30%</option>
                                            </select>
                                        </div>
                                        <div className="flex flex-col gap-4">
                                            <OfferCard title={quantities['p9'] === 1 ? "Confort" : "Standard"} ht={baseTotal} adj={adjustment} final={applyAdj(baseTotal)} color={quantities['p9'] === 1 ? "purple" : "blue"} />
                                            {quantities['l2'] > 0 && (
                                                <OfferCard
                                                    title={quantities['p9'] === 1 ? (isGroupageActive ? "Groupage (Confort)" : "National Forfait (Confort)") : (isGroupageActive ? "Groupage National" : "National Forfait")}
                                                    subtitle={isGroupageActive ? "Groupage — " + natSubtitle : natSubtitle}
                                                    ht={thirdTotalBase} adj={thirdOfferAdjustment} final={applyThirdAdj(thirdTotalBase)}
                                                    color={quantities['p9'] === 1 ? "indigo" : (isGroupageActive ? "teal" : "orange")}
                                                    needsConfirmation={needsConfirmationLD}
                                                />
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* =================================================================
           MODULE CUBAGE & INVENTAIRE
           ================================================================= */
        const CubageModule = ({ db, dbReady }) => {
            const [catalog, setCatalog] = useState(() => { const s = LS.get('h2_catalog'); return s ? JSON.parse(s) : []; });
            const [inventory, setInventory] = useState(() => { const s = LS.get('h2_inventory'); return s ? JSON.parse(s) : []; });
            const [notes, setNotes] = useState(() => LS.get('h2_notes') || DEFAULT_NOTES);
            const [room, setRoom] = useState('Generale');
            const [search, setSearch] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);
            const [showAdminCode, setShowAdminCode] = useState(false);
            const [adminCodeInput, setAdminCodeInput] = useState('');
            const [adminError, setAdminError] = useState('');
            const [edit, setEdit] = useState({ id: '', name: '', vol: '' });
            const [showForm, setShowForm] = useState(false);
            const [notesOpen, setNotesOpen] = useState(false);
            const [confirm, setConfirm] = useState(null);
            const [toast, setToast] = useState('');
            const [mobileView, setMobileView] = useState('catalog');
            const [isDesktop, setIsDesktop] = useState(typeof window !== 'undefined' ? window.innerWidth >= 1024 : true);
            const seededRef = useRef(false);

            useEffect(() => { const onR = () => setIsDesktop(window.innerWidth >= 1024); window.addEventListener('resize', onR); return () => window.removeEventListener('resize', onR); }, []);

            // Seed local si vide & pas de cloud
            useEffect(() => { if (catalog.length === 0 && !dbReady) setCatalog(INITIAL_CATALOG); }, []);

            // Persistance locale
            useEffect(() => { LS.set('h2_catalog', JSON.stringify(catalog)); }, [catalog]);
            useEffect(() => { LS.set('h2_inventory', JSON.stringify(inventory)); }, [inventory]);
            useEffect(() => { const t = setTimeout(() => LS.set('h2_notes', notes), 400); return () => clearTimeout(t); }, [notes]);

            // Synchro Cloud du catalogue
            const catRef = () => db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('inventory_data').doc('master');
            useEffect(() => {
                if (!dbReady) return;
                const unsub = catRef().onSnapshot((doc) => {
                    if (doc.exists) {
                        const remote = doc.data();
                        if (remote.catalog && Array.isArray(remote.catalog) && remote.catalog.length > 0) {
                            setCatalog(prev => JSON.stringify(prev) !== JSON.stringify(remote.catalog) ? remote.catalog : prev);
                        } else if (!seededRef.current) {
                            seededRef.current = true;
                            const seed = catalog.length > 0 ? catalog : INITIAL_CATALOG;
                            catRef().set({ catalog: seed, lastCatalogUpdate: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                        }
                    } else if (!seededRef.current) {
                        seededRef.current = true;
                        const seed = catalog.length > 0 ? catalog : INITIAL_CATALOG;
                        catRef().set({ catalog: seed, lastCatalogUpdate: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                    }
                }, (err) => { console.error("Listener catalogue:", err); if (catalog.length === 0) setCatalog(INITIAL_CATALOG); });
                return () => unsub && unsub();
            }, [dbReady]);

            const pushCatalogToCloud = (next) => { if (!dbReady) return; catRef().set({ catalog: next, lastCatalogUpdate: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }).catch(e => console.error(e)); };

            const showT = (m) => { setToast(m); setTimeout(() => setToast(''), 2500); };

            const totalVolume = useMemo(() => inventory.reduce((s, it) => s + (it.vol * it.qty), 0), [inventory]);
            const filtered = useMemo(() => catalog.filter(i => i.name.toLowerCase().includes(search.toLowerCase())).sort((a, b) => a.name.localeCompare(b.name)), [catalog, search]);
            const grouped = useMemo(() => inventory.reduce((acc, it) => { (acc[it.room] = acc[it.room] || []).push(it); return acc; }, {}), [inventory]);

            const addToInventory = (itemId) => {
                const ci = catalog.find(i => i.id === itemId); if (!ci) return;
                setInventory(prev => { const ex = prev.find(i => i.itemId === itemId && i.room === room); if (ex) return prev.map(i => (i.itemId === itemId && i.room === room) ? { ...i, qty: i.qty + 1 } : i); return [...prev, { itemId: ci.id, name: ci.name, vol: ci.vol, qty: 1, room }]; });
            };
            const updateQty = (r, itemId, delta) => {
                setInventory(prev => {
                    const idx = prev.findIndex(i => i.itemId === itemId && i.room === r);
                    if (idx === -1) { if (delta > 0) { const ci = catalog.find(i => i.id === itemId); if (ci) return [...prev, { itemId: ci.id, name: ci.name, vol: ci.vol, qty: 1, room: r }]; } return prev; }
                    const next = [...prev]; next[idx] = { ...next[idx], qty: next[idx].qty + delta };
                    if (next[idx].qty <= 0) next.splice(idx, 1);
                    return next;
                });
            };
            const qtyInRoom = (itemId) => { const it = inventory.find(i => i.itemId === itemId && i.room === room); return it ? it.qty : 0; };

            const verifyAdmin = (e) => { e.preventDefault(); if (adminCodeInput === ADMIN_CODE) { setIsAdmin(true); setShowAdminCode(false); setAdminCodeInput(''); setAdminError(''); showT("Mode Admin activé"); } else setAdminError("Code incorrect"); };
            const toggleAdmin = () => { if (isAdmin) { setIsAdmin(false); setShowForm(false); showT("Mode Admin désactivé"); } else setShowAdminCode(true); };

            const saveItem = () => {
                if (!edit.name || isNaN(parseFloat(edit.vol))) { showT("Nom et volume requis"); return; }
                const vol = parseFloat(edit.vol);
                let next;
                if (edit.id) next = catalog.map(i => i.id == edit.id ? { ...i, name: edit.name, vol } : i);
                else next = [...catalog, { id: Date.now(), name: edit.name, vol }];
                setCatalog(next); pushCatalogToCloud(next);
                setEdit({ id: '', name: '', vol: '' }); setShowForm(false);
                showT(dbReady ? "Catalogue mis à jour pour tous" : "Catalogue mis à jour");
            };
            const deleteItem = (id) => { setConfirm({ msg: "Supprimer cet objet du catalogue ?", action: () => { const next = catalog.filter(i => i.id !== id); setCatalog(next); pushCatalogToCloud(next); showT("Objet supprimé"); } }); };
            const loadEdit = (item) => { setEdit({ id: item.id, name: item.name, vol: item.vol }); setShowForm(true); };

            const copyInventory = () => {
                if (inventory.length === 0) { showT("Inventaire vide"); return; }
                let text = "";
                Object.keys(grouped).sort().forEach(r => { text += `${(ROOM_LABELS[r] || r).toUpperCase()}\n`; grouped[r].forEach(it => { text += `${it.name}\t${it.qty}\n`; }); text += "\n"; });
                text += `TOTAL:\t${totalVolume.toFixed(2)} m³`;
                const cartonTypes = ["Carton livre", "Carton penderie", "Carton standard", "Carton vaisselle"];
                const counts = {}; let has = false;
                inventory.forEach(it => { if (cartonTypes.includes(it.name)) { counts[it.name] = (counts[it.name] || 0) + it.qty; has = true; } });
                if (has) { text += "\n\n--- DÉTAIL CARTONS ---\n"; Object.keys(counts).sort().forEach(n => { text += `${n}\t${counts[n]}\n`; }); }
                copyText(text, () => showT("Inventaire copié"), () => showT("Erreur copie"));
            };
            const copyNotesFn = () => copyText(notes, () => showT("Notes copiées"), () => showT("Erreur copie"));

            const CatalogPanel = (
                <section className="flex flex-col bg-white border border-slate-200 rounded-xl overflow-hidden h-full">
                    <div className="p-4 bg-white border-b border-slate-100 sticky top-0 z-10 shadow-sm">
                        <div className="flex justify-between items-center mb-3">
                            <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2"><Box size={18} className="text-blue-500" /> Catalogue</h2>
                            {isAdmin && <span className="text-[10px] font-bold bg-red-100 text-red-600 px-2 py-0.5 rounded border border-red-200 uppercase">Mode Admin</span>}
                        </div>
                        <div className="mb-3">
                            <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Pièce active</label>
                            <select value={room} onChange={e => setRoom(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none shadow-sm">
                                {ROOMS.map(r => <option key={r} value={r}>{ROOM_LABELS[r]}</option>)}
                            </select>
                        </div>
                        <div className="relative">
                            <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Rechercher un objet..." className="w-full pl-9 pr-8 py-3 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none shadow-sm" />
                            <Search size={16} className="absolute left-3 top-3.5 text-slate-400" />
                            {search && <button onClick={() => setSearch('')} className="absolute right-2 top-3 text-slate-400 hover:text-slate-600 bg-white rounded-full p-0.5"><X size={16} /></button>}
                        </div>
                        {isAdmin && (
                            <div className="mt-3">
                                <button onClick={() => setShowForm(!showForm)} className="text-xs font-semibold text-blue-600 hover:text-blue-800 bg-blue-100 px-2 py-1 rounded">+ Créer / Modifier objet (Cloud)</button>
                                {showForm && (
                                    <div className="mt-2 p-3 bg-slate-100 rounded-lg border border-slate-200">
                                        <div className="grid grid-cols-3 gap-2 mb-2">
                                            <div className="col-span-2"><label className="text-xs text-slate-500">Nom</label><input type="text" value={edit.name} onChange={e => setEdit({ ...edit, name: e.target.value })} className="w-full p-1.5 border rounded text-sm" /></div>
                                            <div><label className="text-xs text-slate-500">Vol (m³)</label><input type="number" step="0.01" value={edit.vol} onChange={e => setEdit({ ...edit, vol: e.target.value })} className="w-full p-1.5 border rounded text-sm" /></div>
                                        </div>
                                        <button onClick={saveItem} className="w-full bg-blue-600 text-white py-1.5 rounded text-sm font-medium hover:bg-blue-700 shadow-sm">Enregistrer et diffuser</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                    <div className="flex-1 overflow-y-auto p-2 space-y-2">
                        {filtered.map(item => {
                            const q = qtyInRoom(item.id);
                            return (
                                <div key={item.id} className={`flex items-center justify-between p-3 bg-white border border-slate-200 rounded-lg shadow-sm hover:border-blue-300 ${q > 0 ? 'bg-blue-50/40' : ''}`}>
                                    <div className="flex-1 pr-2">
                                        <div className="font-semibold text-sm text-slate-800">{item.name}</div>
                                        <div className="text-xs text-slate-500 font-mono">{item.vol.toFixed(2)} m³</div>
                                        {isAdmin && <div className="flex gap-2 mt-1"><button onClick={() => loadEdit(item)} className="text-[10px] text-blue-400 hover:text-blue-600 underline">Modifier</button><button onClick={() => deleteItem(item.id)} className="text-[10px] text-slate-300 hover:text-red-500 underline">Suppr.</button></div>}
                                    </div>
                                    <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg p-0.5 shadow-sm">
                                        <button onClick={() => updateQty(room, item.id, -1)} className={`w-9 h-9 flex items-center justify-center text-slate-500 hover:text-red-600 hover:bg-white rounded ${q === 0 ? 'opacity-30 pointer-events-none' : ''}`}><Minus size={16} /></button>
                                        <span className="w-6 text-center font-bold text-sm text-slate-800">{q}</span>
                                        <button onClick={() => addToInventory(item.id)} className="w-9 h-9 flex items-center justify-center text-blue-600 hover:bg-white rounded"><Plus size={18} /></button>
                                    </div>
                                </div>
                            );
                        })}
                        {filtered.length === 0 && <div className="text-center text-slate-400 text-sm py-10">Aucun objet trouvé</div>}
                    </div>
                </section>
            );

            const InventoryPanel = (
                <section className="flex flex-col bg-slate-50 border border-slate-200 rounded-xl overflow-hidden h-full">
                    <div className="p-4 bg-white border-b border-slate-100 sticky top-0 z-10 flex justify-between items-center shadow-sm">
                        <h2 className="text-lg font-bold text-slate-700 flex items-center gap-2"><FileText size={18} className="text-emerald-500" /> Inventaire</h2>
                        <div className="flex gap-2">
                            <button onClick={copyInventory} className="text-xs text-blue-600 hover:text-blue-800 font-medium border border-blue-200 px-2 py-1 rounded bg-blue-50 flex items-center gap-1"><Copy size={13} /> Copier</button>
                            <button onClick={() => setConfirm({ msg: "Vider tout l'inventaire ?", action: () => { setInventory([]); showT("Inventaire vidé"); } })} className="text-xs text-red-500 hover:text-red-700 font-medium border border-red-200 px-2 py-1 rounded bg-red-50 flex items-center gap-1"><Trash2 size={13} /> Vider</button>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-2">
                        {inventory.length === 0 ? (
                            <div className="flex flex-col items-center justify-center h-64 text-slate-400"><Box size={48} className="mb-4 opacity-50" /><p className="text-sm">Aucun objet ajouté</p><p className="text-xs mt-1">Sélectionnez une pièce et ajoutez des objets.</p></div>
                        ) : (
                            Object.keys(grouped).map(r => {
                                const items = grouped[r];
                                const rt = items.reduce((s, it) => s + it.vol * it.qty, 0);
                                return (
                                    <div key={r} className="mb-4 bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                        <div className="bg-slate-50 px-3 py-2 border-b border-slate-100 flex justify-between items-center"><span className="font-bold text-sm text-slate-700 uppercase tracking-wide">{ROOM_LABELS[r] || r}</span><span className="text-xs font-mono font-bold text-blue-600">{rt.toFixed(2)} m³</span></div>
                                        <div className="divide-y divide-slate-50">
                                            {items.map(it => (
                                                <div key={it.itemId} className="p-3 flex items-center justify-between">
                                                    <div className="flex-1"><div className="text-sm font-medium text-slate-800">{it.name}</div><div className="text-[10px] text-slate-400">PU: {it.vol} | Total: {(it.vol * it.qty).toFixed(2)}</div></div>
                                                    <div className="flex items-center gap-2 bg-slate-50 rounded-lg p-0.5 border border-slate-100">
                                                        <button onClick={() => updateQty(r, it.itemId, -1)} className="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-red-500 hover:bg-white rounded"><Minus size={15} /></button>
                                                        <span className="w-6 text-center font-bold text-sm text-slate-700">{it.qty}</span>
                                                        <button onClick={() => updateQty(r, it.itemId, 1)} className="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-blue-500 hover:bg-white rounded"><Plus size={15} /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>
                </section>
            );

            return (
                <div className="p-3 md:p-6">
                    {/* Barre d'outils du module */}
                    <div className="max-w-7xl mx-auto mb-4 flex flex-wrap items-center justify-between gap-3">
                        <div className="bg-blue-50 px-4 py-2 rounded-lg border border-blue-100 flex items-center gap-2">
                            <span className="text-xs text-blue-600 uppercase font-bold">Volume total</span>
                            <span className="text-xl font-bold text-blue-800">{totalVolume.toFixed(2)}</span><span className="text-xs text-blue-600">m³</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setNotesOpen(true)} className="bg-amber-50 text-amber-600 border border-amber-200 px-3 py-2 rounded-lg flex items-center gap-2 hover:bg-amber-100 shadow-sm"><Edit3 size={16} /><span className="text-xs font-bold">NOTES</span></button>
                            <button onClick={toggleAdmin} className={`p-2 rounded-lg border ${isAdmin ? 'bg-red-50 text-red-600 border-red-200' : 'bg-slate-100 text-slate-500 border-slate-300 hover:text-blue-600'}`} title="Administration"><Lock size={16} /></button>
                        </div>
                    </div>

                    {/* Toggle mobile */}
                    {!isDesktop && (
                        <div className="max-w-7xl mx-auto mb-3 flex bg-white border border-slate-200 rounded-lg p-1 shadow-sm">
                            <button onClick={() => setMobileView('catalog')} className={`flex-1 py-2 text-sm font-semibold rounded-md ${mobileView === 'catalog' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>Catalogue</button>
                            <button onClick={() => setMobileView('inventory')} className={`flex-1 py-2 text-sm font-semibold rounded-md ${mobileView === 'inventory' ? 'bg-emerald-600 text-white' : 'text-slate-500'}`}>Inventaire {inventory.length > 0 && `(${inventory.reduce((s, i) => s + i.qty, 0)})`}</button>
                        </div>
                    )}

                    <div className="max-w-7xl mx-auto">
                        {isDesktop ? (
                            <div className="grid grid-cols-2 gap-4" style={{ height: 'calc(100vh - 220px)', minHeight: '500px' }}>{CatalogPanel}{InventoryPanel}</div>
                        ) : (
                            <div style={{ height: 'calc(100vh - 250px)', minHeight: '450px' }}>{mobileView === 'catalog' ? CatalogPanel : InventoryPanel}</div>
                        )}
                    </div>

                    {/* Code admin */}
                    {showAdminCode && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[70] p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                                <h3 className="text-lg font-bold text-slate-800 mb-2">Accès Administrateur</h3>
                                <p className="text-sm text-slate-500 mb-4">Entrez le code pour modifier le catalogue global.</p>
                                <div>
                                    <input type="password" value={adminCodeInput} onChange={e => setAdminCodeInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') verifyAdmin(e); }} autoFocus className="w-full p-3 border border-slate-300 rounded-lg mb-3 text-center tracking-widest text-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="Code d'accès" />
                                    {adminError && <p className="text-red-500 text-xs mb-3 text-center">{adminError}</p>}
                                    <div className="flex gap-2"><button type="button" onClick={() => { setShowAdminCode(false); setAdminError(''); }} className="flex-1 py-2 text-slate-600 font-medium bg-slate-100 rounded-lg hover:bg-slate-200">Annuler</button><button type="button" onClick={verifyAdmin} className="flex-1 py-2 text-white font-medium bg-blue-600 rounded-lg hover:bg-blue-700">Valider</button></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Notes */}
                    {notesOpen && (
                        <div className="fixed inset-0 z-[65] flex justify-end">
                            <div onClick={() => setNotesOpen(false)} className="absolute inset-0 bg-black/30 backdrop-blur-sm"></div>
                            <div className="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col">
                                <div className="p-4 bg-amber-50 border-b border-amber-100 flex justify-between items-center">
                                    <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2"><Edit3 size={18} className="text-amber-500" /> Notes</h2>
                                    <button onClick={() => setNotesOpen(false)} className="text-slate-400 hover:text-slate-600 bg-white rounded-full p-1"><X size={22} /></button>
                                </div>
                                <div className="p-2 border-b border-slate-100 flex justify-end gap-2 bg-white">
                                    <button onClick={copyNotesFn} className="text-xs text-blue-600 hover:text-blue-800 font-medium border border-blue-200 px-3 py-1.5 rounded bg-blue-50">Copier</button>
                                    <button onClick={() => setConfirm({ msg: "Vider toutes les notes ?", action: () => { setNotes(DEFAULT_NOTES); showT("Notes réinitialisées"); } })} className="text-xs text-red-500 hover:text-red-700 font-medium border border-red-200 px-3 py-1.5 rounded bg-red-50">Vider</button>
                                </div>
                                <div className="flex-1 p-4 bg-yellow-50"><textarea value={notes} onChange={e => setNotes(e.target.value)} className="w-full h-full bg-transparent resize-none outline-none text-sm text-slate-700 font-mono leading-relaxed" placeholder="Prendre des notes ici..."></textarea></div>
                            </div>
                        </div>
                    )}

                    {/* Confirmation */}
                    {confirm && (
                        <div className="fixed inset-0 bg-black/50 z-[70] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm">
                                <h3 className="text-lg font-bold text-slate-800 mb-2">Confirmation</h3>
                                <p className="text-sm text-slate-500 mb-4">{confirm.msg}</p>
                                <div className="flex gap-2"><button onClick={() => setConfirm(null)} className="flex-1 py-2 text-slate-600 font-medium bg-slate-100 rounded-lg hover:bg-slate-200">Non</button><button onClick={() => { confirm.action(); setConfirm(null); }} className="flex-1 py-2 text-white font-medium bg-red-600 rounded-lg hover:bg-red-700">Oui</button></div>
                            </div>
                        </div>
                    )}

                    {toast && <Toast msg={toast} />}
                </div>
            );
        };

        /* =================================================================
           CONSOLE — synthèse des tarifs appliqués (accès code admin)
           ================================================================= */
        const ConsoleView = ({ prices, localGrid, nationalGrid, matrixData }) => {
            const fixedRows = [
                { label: 'Démontage / Remontage (par meuble)', val: formatCurrency(prices.p3) },
                { label: 'Option Confort (par tranche de 10 m³)', val: formatCurrency((matrixData.find(r => r.m3 === 10) || {}).confort || 160) },
                { label: 'Monte-meuble — 1/2 journée', val: formatCurrency(prices.p5) },
                { label: 'Monte-meuble — 1 journée', val: formatCurrency(prices.p6) },
                { label: 'AOT (autorisation de stationnement)', val: formatCurrency(prices.p7) },
                { label: 'Livraison de matériel', val: formatCurrency(prices.m6) },
                { label: 'Carton standard', val: formatCurrency(prices.m1) },
                { label: 'Carton livre', val: formatCurrency(prices.m2) },
                { label: 'Carton penderie', val: formatCurrency(prices.m3) },
                { label: 'Papier bulle', val: formatCurrency(prices.m4) },
                { label: 'Scotch', val: formatCurrency(prices.m5) },
            ];
            const sortedNat = [...nationalGrid].sort((a, b) => a.max - b.max);
            const Card = ({ title, icon, children }) => (
                <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                    <div className="bg-slate-800 text-white px-4 py-3 font-bold flex items-center gap-2">{icon}{title}</div>
                    <div className="overflow-x-auto">{children}</div>
                </div>
            );
            return (
                <div className="p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <div className="mb-6">
                            <h2 className="text-2xl font-bold text-slate-800">Console — Tarifs appliqués</h2>
                            <p className="text-sm text-slate-500 mt-1">Vue synthétique en lecture seule des tarifs en vigueur dans l'onglet Tarification. Pour modifier ces valeurs : Tarification → bouton cadenas (admin).</p>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                            <Card title="Prestations à tarif fixe" icon={<Calculator size={16} />}>
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-slate-50 text-slate-500 uppercase text-xs border-b"><tr><th className="px-4 py-2">Désignation</th><th className="px-4 py-2 text-right">Tarif</th></tr></thead>
                                    <tbody>
                                        {fixedRows.map((r, i) => (<tr key={i} className="border-b last:border-0 hover:bg-slate-50"><td className="px-4 py-2 text-slate-700">{r.label}</td><td className="px-4 py-2 text-right font-semibold text-slate-800">{r.val}</td></tr>))}
                                    </tbody>
                                </table>
                            </Card>
                            <div className="flex flex-col gap-6">
                                <Card title="Distance — LOCAL" icon={<MapPin size={16} />}>
                                    <table className="w-full text-sm text-center">
                                        <thead className="bg-slate-50 text-slate-500 uppercase text-xs border-b"><tr><th className="px-3 py-2">De (km)</th><th className="px-3 py-2">À (km)</th><th className="px-3 py-2">Prix / km</th></tr></thead>
                                        <tbody>
                                            {localGrid.map((r) => (<tr key={r.id} className="border-b last:border-0 hover:bg-slate-50"><td className="px-3 py-2">{r.min}</td><td className="px-3 py-2">{r.max}</td><td className="px-3 py-2 font-semibold">{formatCurrency(r.price)}</td></tr>))}
                                        </tbody>
                                    </table>
                                </Card>
                                <Card title="Distance — NATIONAL (forfaits)" icon={<MapIcon size={16} />}>
                                    <table className="w-full text-sm text-center">
                                        <thead className="bg-slate-50 text-slate-500 uppercase text-xs border-b"><tr><th className="px-3 py-2">Jusqu'à (km)</th><th className="px-3 py-2">Type</th><th className="px-3 py-2">Valeur</th></tr></thead>
                                        <tbody>
                                            {sortedNat.map((r) => (<tr key={r.id} className="border-b last:border-0 hover:bg-slate-50"><td className="px-3 py-2">{r.max >= 99999 ? 'au-delà' : r.max}</td><td className="px-3 py-2">{r.type === 'fixed' ? 'Forfait' : '€/km'}</td><td className="px-3 py-2 font-semibold">{r.type === 'fixed' ? formatCurrency(r.value + (r.addOn || 0)) : formatCurrency(r.value) + '/km'}</td></tr>))}
                                        </tbody>
                                    </table>
                                </Card>
                            </div>
                        </div>
                        <Card title="Grille volume (m³) — prix au m³, étages, portage, camions" icon={<Box size={16} />}>
                            <div className="max-h-[420px] overflow-y-auto">
                                <table className="w-full text-sm text-center">
                                    <thead className="bg-slate-100 text-slate-600 uppercase text-xs sticky top-0"><tr><th className="px-3 py-2">m³</th><th className="px-3 py-2">Prix base (€/m³)</th><th className="px-3 py-2">Étages (€)</th><th className="px-3 py-2">Portage (€)</th><th className="px-3 py-2">Confort (€)</th><th className="px-3 py-2">Camions</th></tr></thead>
                                    <tbody>
                                        {matrixData.map((r) => (<tr key={r.m3} className="border-b last:border-0 hover:bg-slate-50"><td className="px-3 py-2 font-bold bg-slate-50">{r.m3}</td><td className="px-3 py-2">{Number(r.prix).toFixed(2)}</td><td className="px-3 py-2">{r.etage}</td><td className="px-3 py-2">{r.portage}</td><td className="px-3 py-2">{r.confort}</td><td className="px-3 py-2 text-slate-500">{r.camion}</td></tr>))}
                                    </tbody>
                                </table>
                            </div>
                        </Card>
                    </div>
                </div>
            );
        };

        /* =================================================================
           APP — accès, onglets, Firebase, diffusion de version
           ================================================================= */
        const App = () => {
            const [unlocked, setUnlocked] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [accessError, setAccessError] = useState('');
            const [tab, setTab] = useState('tarification');
            const [db, setDb] = useState(null);
            const [authReady, setAuthReady] = useState(false);
            const [latestVersion, setLatestVersion] = useState(null);
            const [updateAvailable, setUpdateAvailable] = useState(false);
            const [appToast, setAppToast] = useState('');
            // Configuration tarifaire partagée (Tarification + Console)
            const [prices, setPrices] = useState(() => { const p = { l1: 1300 }; [...INITIAL_DATA.prestation, ...INITIAL_DATA.ra_monte_meuble, ...INITIAL_DATA.materiel].forEach(i => p[i.id] = i.defaultPrice); return p; });
            const [matrixData, setMatrixData] = useState(() => generateInitialMatrix());
            const [nationalGrid, setNationalGrid] = useState(() => DEFAULT_NATIONAL_GRID);
            const [localGrid, setLocalGrid] = useState(() => DEFAULT_LOCAL_GRID);
            const [consoleUnlocked, setConsoleUnlocked] = useState(false);
            const [showConsoleCode, setShowConsoleCode] = useState(false);
            const [consoleCodeInput, setConsoleCodeInput] = useState('');
            const [consoleError, setConsoleError] = useState('');
            const initedRef = useRef(false);

            const verifyConsole = () => {
                if (consoleCodeInput === ADMIN_CODE) { setConsoleUnlocked(true); setShowConsoleCode(false); setConsoleCodeInput(''); setConsoleError(''); setTab('console'); }
                else { setConsoleError('Code incorrect'); }
            };

            const cfgRef = (database) => database.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('config').doc('app');

            // Cache busting local
            useEffect(() => {
                try {
                    const VK = 'h2_app_version';
                    if (LS.get(VK) !== APP_VERSION) { LS.remove('h2_catalog'); LS.set(VK, APP_VERSION); }
                } catch (e) {
                    // erreurs de stockage ignorées
                }
            }, []);

            // Initialisation Firebase (uniquement si une configuration est fournie)
            useEffect(() => {
                if (initedRef.current) return;
                initedRef.current = true;
                let config = {};
                try {
                    if (typeof __firebase_config !== 'undefined' && __firebase_config) config = JSON.parse(__firebase_config);
                    else if (FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey) config = FIREBASE_CONFIG;
